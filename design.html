    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gallery-item {
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
        }
        .gallery-item:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
